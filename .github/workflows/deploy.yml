name: Deploy

# Deploy to Cloudflare on every push to main (and on manual dispatch).
# Requires one repo secret: CLOUDFLARE_API_TOKEN
#   (token needs Workers Scripts: Edit and D1: Edit on this account).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Account id is an identifier, not a secret.
      CLOUDFLARE_ACCOUNT_ID: "53bf313d93a4229b80d6fb2500b5e901"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply artset-db --remote

      - name: Deploy Worker
        run: npx wrangler deploy
